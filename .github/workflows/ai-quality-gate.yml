# AI quality pipeline. Blocking half: on every PR — and, as post-merge
# verification, on every push to main — a Claude agent reads the
# diff, selects the relevant subset of the black-box test suite
# (payflow-automation repo), runs it against this PR's build, triages failures
# against the business rules, and posts the report as a PR comment. The `gate`
# job fails unless the agent's verdict is "pass".
#
# Non-blocking half: downstream jobs consume the gate's machine artifact
# (gate-triage.json — schema in payflow-automation/docs/agent-pipeline.md):
#   file-bugs      — product-bug triage entries become deduplicated GitHub
#                    issues on this repo
#   heal-tests     — test-defect/environment entries become a mechanics-only
#                    fix PR on the test repo (human-reviewed)
#   generate-tests — coverage gaps become a candidate-tests PR on the test
#                    repo (human-reviewed)
# Only `gate` should be a required status check; the enrichment jobs must never
# block a merge.
#
# Secrets:
#   CLAUDE_CODE_OAUTH_TOKEN — from `claude setup-token`. In a production setup
#     an org-managed ANTHROPIC_API_KEY would be used instead — swap the input
#     on the claude-code-action steps.
#   QA_REPO_TOKEN — PAT with write access to georgi-stoykov/payflow-automation;
#     lets heal-tests/generate-tests push branches and open PRs there. If
#     unset, those two jobs skip themselves.

name: AI Quality Gate

on:
  pull_request:        # opened, synchronize (new pushes to the PR), reopened
  # claude-code-action does not run on push events, so pushes to main are
  # relayed to a workflow_dispatch of this same workflow (the `relay` job).
  # workflow_dispatch also gives a manual "Run workflow" button.
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      diff_base:
        description: "Base sha for the diff (defaults to HEAD^1)"
        required: false
        default: ""

concurrency:
  # event_name in the fallback keeps a push's relay run and the dispatch run
  # it triggers from cancelling each other
  group: quality-gate-${{ github.event.pull_request.number || format('{0}-{1}', github.ref, github.event_name) }}
  cancel-in-progress: true

# Run context that works for both event types: a human-readable label for
# prompts/comments and a slug for agent branch names.
env:
  # quoted because the '#' would otherwise start a YAML comment
  RUN_CONTEXT: "${{ github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || format('main ({0})', github.sha) }}"
  RUN_SLUG: "${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('main-{0}', github.run_id) }}"
  # Seeded-defect mode for the PayFlow build under test. Toggled repo-wide via
  # the Actions variable BUGS (Settings → Secrets and variables → Actions →
  # Variables, or `gh variable set BUGS --body off`); defaults to on. Exported
  # to every step, so all three "Start PayFlow" uvicorn processes inherit it —
  # a real env var beats .env in main.py.
  BUGS: "${{ vars.BUGS || 'on' }}"

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # Pushes to main can't run claude-code-action directly ("Unsupported event
  # type: push"), so re-enter this workflow as a workflow_dispatch. Triggering
  # workflow_dispatch with GITHUB_TOKEN is an explicit exception to GitHub's
  # rule against GITHUB_TOKEN-initiated events starting new workflow runs.
  relay:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Re-dispatch as workflow_dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/workflows/ai-quality-gate.yml/dispatches" \
            -f ref=main \
            -f "inputs[diff_base]=${{ github.event.before }}"

  gate:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout test suite
        uses: actions/checkout@v4
        with:
          repository: georgi-stoykov/payflow-automation
          path: qa

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start PayFlow from the PR branch
        run: |
          pip install -r requirements.txt
          nohup uvicorn main:app --port 8000 > uvicorn.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fs http://127.0.0.1:8000/api/health && exit 0
            sleep 1
          done
          echo "PayFlow did not become healthy" >&2
          cat uvicorn.log >&2
          exit 1

      - name: Install test dependencies
        run: |
          pip install -r qa/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Precompute diff summary
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="origin/${{ github.base_ref }}...HEAD"
          elif git rev-parse -q --verify "${{ inputs.diff_base }}^{commit}" >/dev/null; then
            # dispatch relayed from a push: diff what that push changed
            RANGE="${{ inputs.diff_base }}...HEAD"
          else
            # manual dispatch or unknown base sha: fall back to the last commit
            RANGE="HEAD^1...HEAD"
          fi
          {
            echo "## Files changed"
            git diff --name-status "$RANGE"
            echo
            echo "## Stat"
            git diff --stat "$RANGE"
            echo
            echo "## Diff (truncated to 15000 chars)"
            git diff "$RANGE" | head -c 15000
          } > qa/pr-diff.txt
          head -c 2000 qa/pr-diff.txt

      - name: Run the gate agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # the relay job dispatches this workflow as the github-actions bot
          allowed_bots: github-actions
          prompt: |
            Work inside the qa/ directory (the black-box test suite repo).
            Follow the skill at qa/.claude/skills/pr-test-gate/SKILL.md exactly.
            The PR diff summary is in qa/pr-diff.txt. The PayFlow instance built
            from this PR is running at http://127.0.0.1:8000.
            Write gate-report.md, gate-verdict.txt and gate-triage.json into
            qa/. In gate-triage.json set pr.repo to "${{ github.repository }}",
            pr.number to ${{ github.event.pull_request.number || 0 }} (0 means
            this run verifies a push to main, not a PR) and pr.head_sha to
            "${{ github.event.pull_request.head.sha || github.sha }}".
          claude_args: |
            --max-turns 60
            --allowedTools "Read,Grep,Glob,Write,Bash(python -m pytest:*),Bash(pytest:*),Bash(k6:*),Bash(SMOKE=1 k6:*),Bash(cd qa:*),Bash(curl -s http://127.0.0.1:8000/api/health)"

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-artifacts
          if-no-files-found: warn
          path: |
            qa/gate-report.md
            qa/gate-verdict.txt
            qa/gate-triage.json
            qa/pr-diff.txt

      - name: Post report and enforce verdict
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f qa/gate-report.md ]; then
            echo "AI quality gate produced no report — check the workflow run." > qa/gate-report.md
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file qa/gate-report.md
          else
            # push to main: no PR to comment on — publish to the run summary
            cat qa/gate-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          verdict=missing
          if [ -f qa/gate-verdict.txt ]; then
            verdict=$(tr -d '[:space:]' < qa/gate-verdict.txt)
          fi
          echo "Gate verdict: $verdict"
          [ "$verdict" = "pass" ]

  file-bugs:
    needs: gate
    if: ${{ !cancelled() && needs.gate.result != 'skipped' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      # claude-code-action requires the workspace root to be a checkout of
      # this repo (it fetches origin/main on startup)
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Checkout test suite
        uses: actions/checkout@v4
        with:
          repository: georgi-stoykov/payflow-automation
          path: qa

      - name: Download gate artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: gate-artifacts
          path: artifacts

      - name: Count product-bug triage entries
        id: triage
        run: |
          count=$(jq '[.failures // [] | .[] | select(.category == "product-bug")] | length' \
            artifacts/gate-triage.json 2>/dev/null || echo 0)
          echo "product_bugs=$count" >> "$GITHUB_OUTPUT"
          echo "Product-bug entries: $count"

      - name: Run the bug-filer agent
        if: steps.triage.outputs.product_bugs != '0'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # the relay job dispatches this workflow as the github-actions bot
          allowed_bots: github-actions
          prompt: |
            Follow the skill at qa/.claude/skills/file-bugs/SKILL.md exactly.
            The gate artifacts are in artifacts/ (gate-triage.json,
            gate-report.md). File issues on ${{ github.repository }}.
            Context: ${{ env.RUN_CONTEXT }}, gate run
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}.
          claude_args: |
            --max-turns 30
            --allowedTools "Read,Grep,Glob,Bash(jq:*),Bash(gh issue:*),Bash(gh label:*),Bash(gh search:*)"

  heal-tests:
    needs: gate
    if: ${{ !cancelled() && needs.gate.result != 'skipped' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Download gate artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: gate-artifacts
          path: artifacts

      - name: Decide whether to heal
        id: decide
        env:
          QA_REPO_TOKEN: ${{ secrets.QA_REPO_TOKEN }}
        run: |
          count=$(jq '[.failures // [] | .[] | select(.category == "test-defect" or .category == "environment")] | length' \
            artifacts/gate-triage.json 2>/dev/null || echo 0)
          if [ -z "$QA_REPO_TOKEN" ]; then
            echo "QA_REPO_TOKEN not set — skipping heal job"
            count=0
          fi
          echo "heal_candidates=$count" >> "$GITHUB_OUTPUT"
          echo "Heal candidates: $count"

      - name: Checkout test suite (writable)
        if: steps.decide.outputs.heal_candidates != '0'
        uses: actions/checkout@v4
        with:
          repository: georgi-stoykov/payflow-automation
          path: qa
          token: ${{ secrets.QA_REPO_TOKEN }}

      - name: Set up Python
        if: steps.decide.outputs.heal_candidates != '0'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start PayFlow from the PR branch
        if: steps.decide.outputs.heal_candidates != '0'
        run: |
          pip install -r requirements.txt
          nohup uvicorn main:app --port 8000 > uvicorn.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fs http://127.0.0.1:8000/api/health && exit 0
            sleep 1
          done
          echo "PayFlow did not become healthy" >&2
          exit 1

      - name: Install test dependencies
        if: steps.decide.outputs.heal_candidates != '0'
        run: |
          pip install -r qa/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run the healer agent
        if: steps.decide.outputs.heal_candidates != '0'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.QA_REPO_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # the relay job dispatches this workflow as the github-actions bot
          allowed_bots: github-actions
          prompt: |
            Work inside the qa/ directory (the black-box test suite repo).
            Follow the skill at qa/.claude/skills/heal-tests/SKILL.md exactly.
            The gate artifacts are in artifacts/. The PayFlow build under test
            (${{ env.RUN_CONTEXT }}) is running at http://127.0.0.1:8000. If
            you produce a fix, push it as branch ai-heal/${{ env.RUN_SLUG }}
            and open a PR on georgi-stoykov/payflow-automation.
          claude_args: |
            --max-turns 80
            --allowedTools "Read,Grep,Glob,Edit,Write,Bash(jq:*),Bash(python -m pytest:*),Bash(pytest:*),Bash(cd qa:*),Bash(git:*),Bash(gh pr:*),Bash(gh label:*),Bash(curl -s http://127.0.0.1:8000/*)"

  generate-tests:
    needs: gate
    if: ${{ !cancelled() && needs.gate.result != 'skipped' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Download gate artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: gate-artifacts
          path: artifacts

      - name: Decide whether to generate
        id: decide
        env:
          QA_REPO_TOKEN: ${{ secrets.QA_REPO_TOKEN }}
        run: |
          count=$(jq '.coverage_gaps // [] | length' \
            artifacts/gate-triage.json 2>/dev/null || echo 0)
          if [ -z "$QA_REPO_TOKEN" ]; then
            echo "QA_REPO_TOKEN not set — skipping generation job"
            count=0
          fi
          echo "gaps=$count" >> "$GITHUB_OUTPUT"
          echo "Coverage gaps: $count"

      - name: Checkout test suite (writable)
        if: steps.decide.outputs.gaps != '0'
        uses: actions/checkout@v4
        with:
          repository: georgi-stoykov/payflow-automation
          path: qa
          token: ${{ secrets.QA_REPO_TOKEN }}

      - name: Set up Python
        if: steps.decide.outputs.gaps != '0'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start PayFlow from the PR branch
        if: steps.decide.outputs.gaps != '0'
        run: |
          pip install -r requirements.txt
          nohup uvicorn main:app --port 8000 > uvicorn.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fs http://127.0.0.1:8000/api/health && exit 0
            sleep 1
          done
          echo "PayFlow did not become healthy" >&2
          exit 1

      - name: Install test dependencies
        if: steps.decide.outputs.gaps != '0'
        run: |
          pip install -r qa/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run the test-generator agent
        if: steps.decide.outputs.gaps != '0'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.QA_REPO_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # the relay job dispatches this workflow as the github-actions bot
          allowed_bots: github-actions
          prompt: |
            Work inside the qa/ directory (the black-box test suite repo).
            Follow the skill at qa/.claude/skills/generate-tests/SKILL.md
            exactly. The gate artifacts are in artifacts/. The PayFlow build
            under test (${{ env.RUN_CONTEXT }}) is running at
            http://127.0.0.1:8000. If you produce candidate tests, push
            them as branch ai-tests/${{ env.RUN_SLUG }}
            and open a PR on georgi-stoykov/payflow-automation.
          claude_args: |
            --max-turns 80
            --allowedTools "Read,Grep,Glob,Edit,Write,Bash(jq:*),Bash(python -m pytest:*),Bash(pytest:*),Bash(cd qa:*),Bash(git:*),Bash(gh pr:*),Bash(gh label:*),Bash(curl -s http://127.0.0.1:8000/*)"
